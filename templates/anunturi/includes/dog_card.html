{% load static %}
{# Full card: photo + name/age/desc/button. Compact (A2 cover): photo + quote only, link via Prietenul tau so back returns there. #}
{% if a2_compact and pet.quote %}
<a href="{% url 'pets_single' pet.pk %}" class="A2-slot-link dog-card-link dog-card-compact" aria-label="Vezi {{ pet.nume }}">
	<article class="dog-card">
		<figure class="dog-card-photo" aria-hidden="true">
			<button type="button" class="wish-btn {% if wishlist_ids and pet.pk in wishlist_ids %}is-active{% endif %}" data-animal-id="{{ pet.pk }}" aria-pressed="{% if wishlist_ids and pet.pk in wishlist_ids %}true{% else %}false{% endif %}">
				<svg viewBox="0 0 24 24" aria-hidden="true">
					<path class="wish-heart" d="M12 21s-7-4.6-10-9.2C-0.3 7.9 2.1 4 6 4c2 0 3.4 1.1 4 2 0.6-0.9 2-2 4-2 3.9 0 6.3 3.9 4 7.8C19 16.4 12 21 12 21z"/>
				</svg>
			</button>
			{% if pet.imagine %}
			<img src="{{ pet.imagine.url }}" alt="" />
			{% elif pet.imagine_fallback %}
			<img src="{% static pet.imagine_fallback %}" alt="" />
			{% else %}
			<img src="{% static 'images/pets/charlie-400x200.jpg' %}" alt="" />
			{% endif %}
		</figure>
		<span class="dog-card-overlay" aria-hidden="true"></span>
		<p class="dog-card-quote" data-quote-rotate>{{ pet.quote }}</p>
	</article>
</a>
{% else %}
<a href="{% url 'pets_single' pet.pk %}" class="A2-slot-link dog-card-link" aria-label="Vezi profil {{ pet.nume }}">
	<article class="dog-card">
		<figure class="dog-card-photo" aria-hidden="true">
			<button type="button" class="wish-btn {% if wishlist_ids and pet.pk in wishlist_ids %}is-active{% endif %}" data-animal-id="{{ pet.pk }}" aria-pressed="{% if wishlist_ids and pet.pk in wishlist_ids %}true{% else %}false{% endif %}">
				<svg viewBox="0 0 24 24" aria-hidden="true">
					<path class="wish-heart" d="M12 21s-7-4.6-10-9.2C-0.3 7.9 2.1 4 6 4c2 0 3.4 1.1 4 2 0.6-0.9 2-2 4-2 3.9 0 6.3 3.9 4 7.8C19 16.4 12 21 12 21z"/>
				</svg>
			</button>
			{% if pet.imagine %}
			<img src="{{ pet.imagine.url }}" alt="" />
			{% elif pet.imagine_fallback %}
			<img src="{% static pet.imagine_fallback %}" alt="" />
			{% else %}
			<img src="{% static 'images/pets/charlie-400x200.jpg' %}" alt="" />
			{% endif %}
		</figure>
		<div class="dog-card-body">
			<h3 class="dog-card-name">{{ pet.nume }}</h3>
			<span class="dog-card-age">{{ pet.varsta }}</span>
			<p class="dog-card-desc">{{ pet.descriere }}</p>
			<span class="dog-card-btn">Vezi profil</span>
		</div>
	</article>
</a>
{% endif %}
