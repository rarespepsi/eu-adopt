{% load static %}
<script>
(function() {
	var fundalUrls = [
		"{% static 'images/transport/fundal_1.jpg' %}",
		"{% static 'images/transport/fundal_2.jpg' %}",
		"{% static 'images/transport/fundal_3.jpg' %}",
		"{% static 'images/transport/fundal_4.jpg' %}"
	];
	function setRandomFundal() {
		var url = fundalUrls[Math.floor(Math.random() * fundalUrls.length)];
		var el = document.body;
		if (el) {
			el.style.backgroundImage = 'url(' + url + ')';
			el.style.backgroundSize = 'cover';
			el.style.backgroundPosition = 'center';
			el.style.backgroundRepeat = 'no-repeat';
			el.style.backgroundAttachment = 'fixed';
		}
	}
	if (document.readyState === 'loading') {
		document.addEventListener('DOMContentLoaded', setRandomFundal);
	} else {
		setRandomFundal();
	}
	setInterval(setRandomFundal, 60 * 60 * 1000);
})();
</script>
