{% load static %}
<a href="{% url 'pets_single' pet.pk %}" class="pt-p2-card-link" aria-label="Vezi profil {{ pet.nume }}">
	<div class="pt-p2-card-photo-wrap" aria-hidden="true">
		<div class="pt-p2-card-photo">
			{% if pet.adoption_state_label %}
			<span
				class="pt-adoption-badge"
				style="position:absolute;left:6px;top:6px;z-index:3;padding:2px 6px;border-radius:999px;background:rgba(0,0,0,0.72);color:#fff;font-size:10px;font-weight:800;letter-spacing:.02em;"
			>{{ pet.adoption_state_label }}</span>
			{% endif %}
			<button type="button" class="wish-btn {% if wishlist_ids and pet.pk in wishlist_ids %}is-active{% endif %}" data-animal-id="{{ pet.pk }}" aria-pressed="{% if wishlist_ids and pet.pk in wishlist_ids %}true{% else %}false{% endif %}" style="top:6px;right:6px;">
				<svg viewBox="0 0 24 24" aria-hidden="true">
					<path class="wish-heart" d="M12 21s-7-4.6-10-9.2C-0.3 7.9 2.1 4 6 4c2 0 3.4 1.1 4 2 0.6-0.9 2-2 4-2 3.9 0 6.3 3.9 4 7.8C19 16.4 12 21 12 21z"/>
				</svg>
			</button>
			{% if user.is_authenticated and display_role != "collaborator" %}
			<button
				type="button"
				class="pt-promoveaza-btn"
				title="Promovare A2"
				onclick="event.preventDefault(); event.stopPropagation(); window.location.href='{% url 'promo_a2_order' pet.pk %}';"
			>
				Promovează-mă
			</button>
			{% endif %}
			{% if pet.imagine %}
			<img
				src="{{ pet.imagine.url }}"
				alt=""
				class="pet-rotating-image"
				loading="lazy"
				decoding="async"
				{% if pet.imagine_2 or pet.imagine_3 %}
				data-rot-src-2="{% if pet.imagine_2 %}{{ pet.imagine_2.url }}{% endif %}"
				data-rot-src-3="{% if pet.imagine_3 %}{{ pet.imagine_3.url }}{% endif %}"
				{% endif %}
			/>
			{% elif pet.imagine_fallback %}
			<img src="{% static pet.imagine_fallback %}" alt="" loading="lazy" decoding="async" />
			{% else %}
			<img src="{% static 'images/pets/charlie-400x200.jpg' %}" alt="" loading="lazy" decoding="async" />
			{% endif %}
		</div>
		<span class="pt-p2-card-name pt-p2-card-name--overlay">{{ pet.nume }}</span>
	</div>
</a>
