{% load static %}
<a href="{% url 'pets_single' pet.pk %}" class="pt-p2-card-link" title="Vezi {{ pet.nume }}" aria-label="Vezi profil {{ pet.nume }}">
	<div class="pt-p2-card-photo-wrap" aria-hidden="true">
		<div class="pt-p2-card-photo">
			{% if pet.imagine_fallback %}
			<img src="{% static pet.imagine_fallback %}" alt="" />
			{% else %}
			<img src="{% static 'images/pets/charlie-400x200.jpg' %}" alt="" />
			{% endif %}
		</div>
		<span class="pt-p2-card-name pt-p2-card-name--overlay">{{ pet.nume }}</span>
	</div>
</a>
