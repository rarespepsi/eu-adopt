<fieldset class="collab-species-fieldset" id="collabSpeciesFieldset">
	<legend class="collab-species-legend">Specie țintă (obligatoriu: minim una)</legend>
	<div class="collab-species-checks">
		<label class="collab-species-chip">
			<input type="checkbox" name="species_dog" value="1" {% if offer.species_dog or tf_species_dog %}checked{% endif %} />
			<span>Câini</span>
		</label>
		<label class="collab-species-chip">
			<input type="checkbox" name="species_cat" value="1" {% if offer.species_cat or tf_species_cat %}checked{% endif %} />
			<span>Pisici</span>
		</label>
		<label class="collab-species-chip">
			<input type="checkbox" name="species_other" value="1" {% if offer.species_other or tf_species_other %}checked{% endif %} />
			<span>Altele</span>
		</label>
	</div>
	<p class="collab-species-note">Notă: selectează minim o categorie; pe baza acestor bife se activează filtrarea în pagina Servicii.</p>
	<p class="collab-species-error" id="collabSpeciesError" aria-live="polite">Bifează minim o categorie specie.</p>
</fieldset>
