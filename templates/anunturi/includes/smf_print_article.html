{% load static %}
<article class="smf-print" role="listitem">
	<a
		href="#"
		class="smf-print__link"
		aria-label="{{ slot.nume }} – {{ slot.pret_lei }} lei"
	>
		<div class="smf-print__mat">
			<div class="smf-print__photo">
				<img
					src="{% static 'images/parteneri/placeholder.jpg' %}"
					alt=""
					loading="lazy"
					width="400"
					height="300"
				/>
			</div>
			<div class="smf-print__meta">
				<span class="smf-print__price">{{ slot.pret_lei }} lei</span>
				<span class="smf-print__name">{{ slot.nume }}</span>
				<span class="smf-print__buys" aria-label="{{ slot.achizitii }} achiziții">{{ slot.achizitii }}</span>
			</div>
		</div>
	</a>
	{% if user.is_authenticated %}
	{% with item_ref="shop_foto:"|add:slot.slot_idx %}
	<button type="button"
		class="smf-print__site-cart{% if site_cart_ref_keys and item_ref in site_cart_ref_keys %} is-active{% endif %}"
		data-site-cart-toggle
		data-kind="shop_foto"
		data-ref-key="{{ item_ref }}"
		data-title="Poză ONG — {{ slot.nume }} ({{ slot.pret_lei }} lei)"
		data-detail-url="{% url 'shop_magazin_foto' %}"
		aria-pressed="{% if site_cart_ref_keys and item_ref in site_cart_ref_keys %}true{% else %}false{% endif %}"
		title="Adaugă sau scoate din coșul I Love"
	>🛒</button>
	{% endwith %}
	{% endif %}
</article>
