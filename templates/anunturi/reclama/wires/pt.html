{# Schemă Prietenul tău (PW): P1, P4, P2, P5, P3 #}
<div class="reclama-pt-wire" aria-hidden="true">
	<div class="reclama-pt-wire__p1 reclama-alt-slot" data-slot="P1"><span class="reclama-slot-name">P1</span><div class="reclama-slot-preview"></div></div>
	<div class="reclama-pt-wire__p4">
		<div class="reclama-alt-slot" data-slot="P4.1"><span class="reclama-slot-name">P4.1</span><div class="reclama-slot-preview"></div></div>
		<div class="reclama-alt-slot" data-slot="P4.2"><span class="reclama-slot-name">P4.2</span><div class="reclama-slot-preview"></div></div>
		<div class="reclama-alt-slot" data-slot="P4.3"><span class="reclama-slot-name">P4.3</span><div class="reclama-slot-preview"></div></div>
	</div>
	<div class="reclama-pt-wire__p2">
		{% for i in "123456789012"|make_list %}
		<div class="reclama-alt-slot reclama-pt-wire__p2-cell" data-slot="P2.{{ forloop.counter }}"><span class="reclama-slot-name">P2.{{ forloop.counter }}</span><div class="reclama-slot-preview"></div></div>
		{% endfor %}
	</div>
	<div class="reclama-pt-wire__p5">
		<div class="reclama-alt-slot" data-slot="P5.1"><span class="reclama-slot-name">P5.1</span><div class="reclama-slot-preview"></div></div>
		<div class="reclama-alt-slot" data-slot="P5.2"><span class="reclama-slot-name">P5.2</span><div class="reclama-slot-preview"></div></div>
		<div class="reclama-alt-slot" data-slot="P5.3"><span class="reclama-slot-name">P5.3</span><div class="reclama-slot-preview"></div></div>
	</div>
	<div class="reclama-pt-wire__p3 reclama-alt-slot" data-slot="P3"><span class="reclama-slot-name">P3</span><div class="reclama-slot-preview"></div></div>
</div>
